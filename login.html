<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dhruv Dental Depot — Login</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="favicon-48x48.png" sizes="48x48" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <nav class="top-nav">
      <a class="brand" href="index.html"><img src="images/logo3.JPG" alt="Dhruv Dental Depot" /></a>
      <div class="nav-links">
        <a href="index.html#about">About Us</a>
        <a href="index.html#contact">Contact Us</a>
        <a class="cart-link" href="cart.html">Cart <span class="cart-count" data-cart-count>0</span></a>
      </div>
    </nav>

    <header class="hero hero-short">
      <div class="hero-inner">
        <p class="eyebrow">Account Access</p>
        <h1>Login Before Checkout</h1>
        <p class="subhead">Use existing account or create a new one to continue.</p>
      </div>
    </header>

    <main>
      <section class="auth-card">
        <form id="authForm" class="checkout-form">
          <h3>Login / Register</h3>
          <label>Full Name (for registration)
            <input name="name" type="text" placeholder="Your name" />
          </label>
          <label>Email
            <input required name="email" type="email" placeholder="you@example.com" />
          </label>
          <label>Password
            <span class="password-field">
              <input required name="password" type="password" placeholder="Enter password" />
              <button class="password-toggle" type="button" aria-label="Show password">Show</button>
            </span>
          </label>
          <div class="auth-actions">
            <button class="primary" type="submit" name="action" value="login">Login</button>
            <button class="ghost" type="submit" name="action" value="register">Create Account</button>
          </div>
          <div class="auth-divider">
            <span>or</span>
          </div>
          <a id="googleLoginBtn" class="ghost google-login-btn" href="#">
            <span class="google-icon" aria-hidden="true">
              <svg viewBox="0 0 533.5 544.3" focusable="false">
                <path fill="#4285F4" d="M533.5 278.4c0-17.4-1.4-34.1-4.1-50.3H272v95.2h146.9c-6.3 34.1-25 63-53.2 82.3v68.1h86.1c50.4-46.4 81.7-114.7 81.7-195.3z"/>
                <path fill="#34A853" d="M272 544.3c72.9 0 134-24.1 178.6-65.4l-86.1-68.1c-24 16.1-54.8 25.6-92.5 25.6-71 0-131.1-48-152.6-112.4H31.6v70.6C76 482.1 167.2 544.3 272 544.3z"/>
                <path fill="#FBBC05" d="M119.4 323.9c-10.5-31.1-10.5-64.9 0-96l-70.6-70.6C12.9 220.4 0 246.7 0 272s12.9 51.6 48.8 114.7l70.6-62.8z"/>
                <path fill="#EA4335" d="M272 107.7c39.7-.6 77.9 14 106.9 40.7l80-80C412.4 24.5 342.7-1.6 272 0 167.2 0 76 62.2 31.6 161.3l70.6 70.6C140.9 155.7 201 107.7 272 107.7z"/>
              </svg>
            </span>
            Continue with Google
          </a>
          <p id="authStatus" class="status-text"></p>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Dhruv Dental Depot. All rights reserved.</p>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
