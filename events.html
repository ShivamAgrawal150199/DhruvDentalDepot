<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dhruv Dental Depot — Events</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="favicon-48x48.png" sizes="48x48" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="description" content="Explore events from Dhruv Dental Depot, including expos and showcases." />
    <link rel="canonical" href="https://ddent.co.in/events.html" />
    <meta property="og:title" content="Dhruv Dental Depot — Events" />
    <meta property="og:description" content="Explore events from Dhruv Dental Depot, including expos and showcases." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ddent.co.in/events.html" />
    <meta property="og:image" content="https://ddent.co.in/images/ChennaiExpo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dhruv Dental Depot — Events" />
    <meta name="twitter:description" content="Explore events from Dhruv Dental Depot, including expos and showcases." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <nav class="top-nav">
      <a class="brand" href="index.html"><img src="images/logo3.JPG" alt="Dhruv Dental Depot" /></a>
      <div class="nav-links">
        <a href="index.html#about">About Us</a>
        <a href="index.html#faq">FAQ</a>
        <a href="index.html#contact">Contact Us</a>
        <a class="cart-link" href="cart.html">Cart <span class="cart-count" data-cart-count>0</span></a>
      </div>
    </nav>

    <header class="hero">
      <div class="hero-inner">
        <p class="eyebrow">Dhruv Dental Depot</p>
        <h1>Events</h1>
        <p class="subhead">Browse our expo participation and event posters.</p>
        <div class="cta-row">
          <a class="ghost" href="index.html">Back to Home</a>
        </div>
      </div>
      <div class="hero-card">
        <div class="stat brand-stat">
          <span>Latest</span>
          <label>Event Highlights</label>
        </div>
      </div>
    </header>

    <main>
      <section class="toolbar">
        <h2>All Events</h2>
      </section>

      <section class="events-grid" data-events-list>
        <article
          class="event-card"
          data-event-poster
          data-event-poster-src="images/ChennaiExpo.png"
          data-event-title="Chennai Expo"
          aria-label="Open Chennai Expo poster"
        >
          <div class="event-card-body">
            <span class="tag">Completed</span>
            <div class="event-title-row">
              <h3>Chennai Expo</h3>
              <span class="event-date">18-19 April 2026</span>
            </div>
          </div>
        </article>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Dhruv Dental Depot. All rights reserved.</p>
    </footer>

    <script src="config.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
