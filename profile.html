<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dhruv Dental Depot - Profile</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="favicon-48x48.png" sizes="48x48" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-requires-auth="true">
    <div class="noise"></div>
    <nav class="top-nav">
      <a class="brand" href="index.html"><img src="images/logo3.JPG" alt="Dhruv Dental Depot" /></a>
      <div class="nav-links">
        <a href="index.html#about">About Us</a>
        <a href="index.html#contact">Contact Us</a>
        <a class="cart-link" href="cart.html">Cart <span class="cart-count" data-cart-count>0</span></a>
      </div>
    </nav>

    <header class="hero hero-short">
      <div class="hero-inner">
        <p class="eyebrow">Account</p>
        <h1>Profile Settings</h1>
        <p class="subhead">Update your name and profession. Email is read-only.</p>
      </div>
    </header>

    <main>
      <section class="auth-card">
        <form id="profileForm" class="checkout-form">
          <h3>Profile</h3>
          <label>Full Name
            <input name="name" type="text" placeholder="Your name" />
          </label>
          <label>Email
            <input name="email" type="email" readonly />
          </label>
          <label>Phone Number
            <input name="phone" type="tel" placeholder="Enter phone number" required />
            <small id="phoneError" class="field-error"></small>
          </label>
          <label>City
            <input name="city" type="text" placeholder="Enter city" required />
          </label>
          <label>Profession
            <select name="profession" required>
              <option value="">Select profession</option>
              <option value="dentist">Dentist</option>
              <option value="dealer">Dealer</option>
              <option value="student">Student</option>
              <option value="universities supplier">Universities Supplier</option>
            </select>
          </label>
          <div class="auth-actions">
            <button class="primary" type="submit">Save Changes</button>
            <a class="ghost" href="index.html">Back to Home</a>
            <button class="ghost danger-btn" type="button" data-delete-account="true">Delete Account</button>
          </div>
          <p id="profileStatus" class="status-text"></p>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Dhruv Dental Depot. All rights reserved.</p>
    </footer>

    <script src="config.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
